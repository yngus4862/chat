services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    command: ["bash", "-lc", ".devcontainer/app-entrypoint.sh"]
    environment:
      APP_HTTP_ADDR: "0.0.0.0:8080"
      APP_WS_ADDR: "0.0.0.0:8081"
      ADMIN_HTTP_ADDR: "127.0.0.1:9099"
      # ADMIN_TOKEN 이 비어있으면 admin 서버는 비활성(안전 기본값)
      ADMIN_TOKEN: "${ADMIN_TOKEN:-}"

      POSTGRES_HOST: "postgres"
      POSTGRES_PORT: "5432"
      POSTGRES_USER: "appuser"
      POSTGRES_PASSWORD: "appsecret"
      POSTGRES_DB: "chatapp"

      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
      - "8081:8081"
    user: vscode
    volumes:
      - type: bind
        source: ..
        target: /workspace
      - type: volume
        source: gocache
        target: /go/pkg/mod
      - type: volume
        source: air-tmp
        target: /workspace/tmp
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    image: migrate/migrate:latest
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - type: bind
        source: ../migrations
        target: /migrations
        read_only: true
    command:
      [
        "-path", "/migrations",
        "-database", "postgres://appuser:appsecret@postgres:5432/chatapp?sslmode=disable",
        "up"
      ]
    restart: "no"

  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: chatapp
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: appsecret
    volumes:
      - pgdata:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:8.6-alpine
    volumes:
      - redisdata:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9090"]
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    volumes:
      - miniodata:/data
    expose:
      - "9000"
      - "9090"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  keycloak:
    profiles: ["auth"]
    image: quay.io/keycloak/keycloak:26.5
    command: ["start-dev", "--health-enabled=true", "--http-port=8082"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    volumes:
      - keycloakdata:/opt/keycloak/data
    expose:
      - "8082"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8082/health/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10

volumes:
  gocache:
  air-tmp:
  pgdata:
  redisdata:
  miniodata:
  keycloakdata: